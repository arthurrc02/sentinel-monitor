<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sentinel — plataforma de monitoramento de infraestrutura">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#334155" opacity="0.5" />
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)" />
  <rect width="1200" height="300" fill="url(#dots)" />

  <!-- linha de pulso, tema de monitoramento -->
  <polyline
    points="0,220 180,220 220,220 250,140 280,260 310,180 340,220 1200,220"
    fill="none"
    stroke="#10b981"
    stroke-width="2.5"
    stroke-linejoin="round"
    stroke-linecap="round"
    opacity="0.55"
  />

  <!-- ícone: anéis de status, ecoando a badge online/offline do dashboard -->
  <g transform="translate(140,150)">
    <circle r="58" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.25" />
    <circle r="40" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.4" />
    <circle r="22" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.6" />
    <circle r="9" fill="#10b981" />
  </g>

  <text x="260" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#f8fafc">
    Sentinel
  </text>
  <text x="262" y="196" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" fill="#94a3b8">
    Monitoramento de infraestrutura em tempo real
  </text>
</svg>
